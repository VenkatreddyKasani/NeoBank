<section class="page-head"><p class="eyebrow">Preferences</p><h1>Settings</h1><p class="page-subtitle">Control your security, notifications and experience.</p></section><section class="settings-layout"><article class="bank-card settings-card"><h2>Notifications</h2><p class="settings-subtitle">Choose what you hear about.</p><button class="setting-row" type="button" (click)="toggle('paymentAlerts')"><div><strong>Payment activity</strong><small>Get notified for every payment and transfer.</small></div><span class="switch" [class.on]="paymentAlerts()"></span></button><button class="setting-row" type="button" (click)="toggle('marketingAlerts')"><div><strong>Insights and offers</strong><small>Personalised money tips and NeoBank updates.</small></div><span class="switch" [class.on]="marketingAlerts()"></span></button></article><article class="bank-card settings-card"><h2>Security</h2><p class="settings-subtitle">Keep your account protected.</p><button class="setting-row" type="button" (click)="toggle('biometricLogin')"><div><strong>Passkey sign-in</strong><small>Sign in safely using your device.</small></div><span class="switch" [class.on]="biometricLogin()"></span></button><button class="setting-row"><div><strong>Change passcode</strong><small>Update your app passcode anytime.</small></div><i class="bi bi-chevron-right"></i></button></article></section>
